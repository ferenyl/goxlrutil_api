name: Bug Report
description: Something isn't working as expected
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug!
        Please fill in as much detail as possible.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What went wrong? What did you expect to happen?
      placeholder: A clear and concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Minimal code or steps to reproduce the issue.
      placeholder: |
        ```python
        transport = WebSocketTransport()
        async with GoXLRClient(transport) as client:
            ...
        ```
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behaviour
      placeholder: What should have happened?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behaviour
      description: Include the full traceback if applicable.
      placeholder: What actually happened?
    validations:
      required: true

  - type: dropdown
    id: transport
    attributes:
      label: Transport
      options:
        - WebSocketTransport
        - UnixSocketTransport
        - HttpTransport
        - Not applicable / unknown
    validations:
      required: true

  - type: input
    id: library_version
    attributes:
      label: Library Version
      description: Run `pip show goxlrutil-api` or `poetry show goxlrutil-api`
      placeholder: e.g. 0.1.0
    validations:
      required: true

  - type: input
    id: python_version
    attributes:
      label: Python Version
      placeholder: e.g. 3.14.4
    validations:
      required: true

  - type: input
    id: daemon_version
    attributes:
      label: GoXLR Utility Daemon Version
      placeholder: e.g. 0.12.3
    validations:
      required: false

  - type: input
    id: device
    attributes:
      label: GoXLR Device
      placeholder: GoXLR Full, GoXLR Mini, or unknown
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Logs, screenshots, or anything else that might help.
    validations:
      required: false
